name: Create production artefact

on:
  workflow_dispatch:
  push:
    branches: [production, master]
    paths-ignore:
      - .github/**

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-node@v3
        with:
          node-version: 24.11.1

      - name: Setup PHP with composer v2.
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ secrets.PHP_VERSION }}
          tools: composer:v2
        env:
          COMPOSER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Composer Cache Directory.
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache composer packages.
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Cache node modules.
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Validate composer.json and composer.lock.
        run: composer validate
        shell: bash

      - name: Merge composer.local.json (pre-install).
        run: |
          if [ -f composer-local-merge.php ]; then
            php composer-local-merge.php pre-install
          else
            echo "No composer-local-merge.php found - skipping local merge"
          fi
        shell: bash

      - name: Install composer dependencies.
        run: composer install --prefer-dist --no-progress --no-suggest --optimize-autoloader --classmap-authoritative
        shell: bash

      - name: Restore composer files after local merge (post-install).
        run: |
          if [ -f composer-local-merge.php ]; then
            php composer-local-merge.php post-install
          else
            echo "No composer-local-merge.php found - skipping restore"
          fi
        shell: bash

      - name: Write composer versions info file.
        run: composer show >> composer.versions.md
        shell: bash

      - name: Inject access token in .npmrc.
        run: |
          echo "@helsingborg-stad:registry=https://npm.pkg.github.com/helsingborg-stad" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
        shell: bash

      - name: Get ACF
        run: |
          wget "${{ secrets.ACF_URL }}" -O acf.zip
          unzip acf.zip -d wp-content/plugins/
          rm acf.zip
        shell: bash

      - name: Execute buildscripts in themes and plugins folders.
        run: php ./build.php --cleanup --no-composer-in-child-packages --install-npm
        shell: bash

      - name: Cleanup .npmrc
        run: rm ~/.npmrc
        shell: bash

      - name: Upload artefact.
        uses: actions/upload-artifact@v4
        with:
          name: production-artefact
          path: .
          retention-days: 7
